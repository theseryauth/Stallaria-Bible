<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#252536;
--accent:#c8a04e;--accent2:#e8c96e;--text:#e8e8f0;--text2:#8888a0;
--red:#e05050;--green:#50c878;--blue:#5090e0;
--radius:14px;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;
min-height:100vh;min-height:100dvh;overflow-x:hidden;
padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
/* HEADER */
.header{
position:sticky;top:0;z-index:100;
background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
padding:16px 16px 12px;border-bottom:1px solid var(--border);
}
.title-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo{
width:36px;height:36px;border-radius:8px;
background:linear-gradient(135deg,var(--accent),#8b6914);
display:flex;align-items:center;justify-content:center;
font-size:18px;font-weight:900;color:var(--bg);
}
.title{font-size:22px;font-weight:900;letter-spacing:-0.5px;color:var(--text)}
.title span{color:var(--accent)}
.stats{font-size:11px;color:var(--text2);font-weight:300;margin-left:auto;text-align:right;line-height:1.4}
/* SEARCH */
.search-wrap{position:relative}
.search-input{
width:100%;height:52px;
background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);
padding:0 48px 0 44px;
font-size:17px;font-family:'Outfit',sans-serif;font-weight:500;
color:var(--text);outline:none;
transition:border-color .2s,box-shadow .2s;
}
.search-input::placeholder{color:var(--text2);font-weight:300}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,160,78,0.15)}
.search-icon{
position:absolute;left:14px;top:50%;transform:translateY(-50%);
width:20px;height:20px;color:var(--text2);pointer-events:none;
}
.clear-btn{
position:absolute;right:10px;top:50%;transform:translateY(-50%);
width:32px;height:32px;border-radius:50%;border:none;
background:var(--border);color:var(--text2);font-size:18px;
cursor:pointer;display:none;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;
}
.clear-btn.show{display:flex}
/* FILTERS */
.filters{
display:flex;gap:6px;padding:10px 16px 6px;overflow-x:auto;
-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.filter-btn{
flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);
background:transparent;color:var(--text2);font-size:13px;font-family:'Outfit',sans-serif;
font-weight:500;cursor:pointer;transition:all .2s;
-webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}
/* RESULTS */
.results-info{
padding:8px 16px 4px;font-size:12px;color:var(--text2);font-weight:300;
font-family:'JetBrains Mono',monospace;
}
.results{padding:4px 12px 100px;display:flex;flex-direction:column;gap:6px}
.card{
background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
padding:14px 16px;transition:border-color .15s;
-webkit-tap-highlight-color:transparent;
}
.card:active{border-color:var(--accent)}
.card-q{font-size:15px;font-weight:500;line-height:1.45;color:var(--text);margin-bottom:6px}
.card-a{
font-size:14px;font-weight:700;color:var(--accent2);line-height:1.4;
font-family:'JetBrains Mono',monospace;
}
.card-tag{
display:inline-block;margin-top:6px;padding:2px 8px;border-radius:6px;
font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;
}
.tag-map{background:rgba(80,144,224,0.15);color:var(--blue)}
.tag-quiz{background:rgba(200,160,78,0.15);color:var(--accent)}
.tag-drop{background:rgba(80,200,120,0.15);color:var(--green)}
.tag-bonus{background:rgba(224,80,80,0.15);color:var(--red)}
.tag-song{background:rgba(180,100,220,0.15);color:#b464dc}
.tag-geo{background:rgba(100,200,200,0.15);color:#64c8c8}
/* HIGHLIGHT */
mark{background:rgba(200,160,78,0.3);color:var(--accent2);border-radius:2px;padding:0 1px}
/* EMPTY STATE */
.empty{
text-align:center;padding:60px 20px;color:var(--text2);
}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.4}
.empty-text{font-size:15px;font-weight:300;line-height:1.5}
/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* PWA feel */
body{-webkit-user-select:none;user-select:none}
.card-a{-webkit-user-select:text;user-select:text}
</style>
</head>

// ===== CATEGORIES =====
const CATS = [
  {id:"all",label:"Vše",tagClass:""},
  {id:"map",label:"Mapy",tagClass:"tag-map"},
  {id:"quiz",label:"Kvíz",tagClass:"tag-quiz"},
  {id:"drop",label:"Dropy",tagClass:"tag-drop"},
  {id:"bonus",label:"Bonusy",tagClass:"tag-bonus"},
  {id:"song",label:"Písně",tagClass:"tag-song"},
];

const TAG_MAP = {map:"tag-map",quiz:"tag-quiz",drop:"tag-drop",bonus:"tag-bonus",song:"tag-song",geo:"tag-geo"};
const LABEL_MAP = {map:"MAPA",quiz:"KVÍZ",drop:"DROP",bonus:"BONUS",song:"PÍSEŇ",geo:"GEO"};

// ===== INIT =====
let activeFilter = "all";
const searchEl = document.getElementById("search");
const clearBtn = document.getElementById("clearBtn");
const resultsEl = document.getElementById("results");
const resultsInfo = document.getElementById("resultsInfo");
const filtersEl = document.getElementById("filters");
const statsEl = document.getElementById("stats");

statsEl.textContent = DATA.length + " položek";

// Build filter buttons
CATS.forEach(c => {
  const btn = document.createElement("button");
  btn.className = "filter-btn" + (c.id === "all" ? " active" : "");
  btn.textContent = c.label;
  btn.dataset.cat = c.id;
  btn.addEventListener("click", () => {
    activeFilter = c.id;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
  filtersEl.appendChild(btn);
});

// ===== SEARCH & RENDER =====
function normalize(s){
  return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}

function render(){
  const raw = searchEl.value.trim();
  const q = normalize(raw);
  clearBtn.classList.toggle("show", raw.length > 0);

  let filtered = DATA;
  if(activeFilter !== "all"){
    filtered = filtered.filter(d => d.cat === activeFilter);
  }

  if(q.length > 0){
    // Score items
    filtered = filtered.map(d => {
      const nq = normalize(d.q);
      const na = normalize(d.a);
      let score = 0;
      if(nq.includes(q)) score += 10;
      if(na.includes(q)) score += 15;
      // partial word match
      const words = q.split(/\s+/);
      words.forEach(w => {
        if(w.length < 2) return;
        if(nq.includes(w)) score += 3;
        if(na.includes(w)) score += 5;
      });
      return {...d, score};
    }).filter(d => d.score > 0).sort((a,b) => b.score - a.score);
  }

  resultsInfo.textContent = q.length > 0
    ? `${filtered.length} výsledků pro "${raw}"`
    : `${filtered.length} položek`;

  if(filtered.length === 0){
    resultsEl.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nic nenalezeno.<br>Zkus jiné klíčové slovo.</div></div>`;
    return;
  }

  // Only render first 80 for perf
  const toRender = filtered.slice(0, 80);
  let html = "";
  toRender.forEach(d => {
    const tagClass = TAG_MAP[d.cat] || "tag-quiz";
    const label = LABEL_MAP[d.cat] || "KVÍZ";
    let qText = escHtml(d.q);
    let aText = escHtml(d.a);
    if(q.length > 0){
      qText = highlight(qText, raw);
      aText = highlight(aText, raw);
    }
    html += `<div class="card"><div class="card-q">${qText}</div><div class="card-a">${aText}</div><span class="card-tag ${tagClass}">${label}</span></div>`;
  });
  if(filtered.length > 80){
    html += `<div style="text-align:center;padding:16px;color:var(--text2);font-size:13px">Zobrazeno 80 z ${filtered.length} — upřesni hledání</div>`;
  }
  resultsEl.innerHTML = html;
}

function escHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function highlight(text, query){
  if(!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  const re = new RegExp(`(${escaped})`,"gi");
  return text.replace(re,"<mark>$1</mark>");
}

// ===== EVENTS =====
let debounce;
searchEl.addEventListener("input", () => {
  clearTimeout(debounce);
  debounce = setTimeout(render, 60);
});
clearBtn.addEventListener("click", () => {
  searchEl.value = "";
  searchEl.focus();
  render();
});

// Initial render
render();

// Focus search on load
setTimeout(() => searchEl.focus(), 300);
</script>
